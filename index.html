<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教材システム - Todoリスト演習</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="top-pane">
        <div class="instruction-area">
          <div class="problem-header">
            <h2 id="problem-title">読み込み中...</h2>
            <span id="progress-label"></span>
          </div>
          <p id="problem-instruction"></p>
          <div class="nav-buttons">
            <button id="prev-btn">← 前へ</button>
            <button id="check-btn">チェック</button>
            <button id="next-btn">次へ →</button>
          </div>
          <div id="result-area" class="result"></div>
        </div>
      </div>

      <div id="h-splitter" class="splitter splitter-h"></div>

      <div id="bottom-pane">
        <div id="editor-pane">
          <div id="tabs">
            <button class="tab active" data-lang="html">HTML</button>
            <button class="tab" data-lang="css">CSS</button>
            <button class="tab" data-lang="js">JS</button>
          </div>
          <div id="monaco-container"></div>
        </div>

        <div id="v-splitter" class="splitter splitter-v"></div>

        <div id="preview-pane">
          <iframe id="preview-frame" sandbox="allow-scripts allow-forms allow-modals allow-same-origin"></iframe>
          <div id="iframe-cover"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
